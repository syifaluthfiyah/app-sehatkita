<!DOCTYPE html>
<html lang="en">
<head>
    <title>SehatKita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #ffffff);
            font-family: "Segoe UI", sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, #2e7d32, #66bb6a);
        }

        .navbar-brand {
            font-size: 22px;
            letter-spacing: 1px;
        }

        .card {
            border-radius: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .btn-primary {
            background-color: #2e7d32;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1b5e20;
        }

        .btn-success {
            background-color: #66bb6a;
            border: none;
        }

        .btn-success:hover {
            background-color: #388e3c;
        }

        h1 {
            color: #2e7d32;
        }

        .container {
            max-width: 900px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">SehatKita</span>
    </div>
</nav>

<!-- CONTAINER -->
<div class="container mt-5">

    <!-- HEADER -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">Dashboard Kesehatan</h1>
        <p class="text-muted">Sistem Booking & Manajemen Layanan Kesehatan</p>
    </div>

    <!-- MENU CARD -->
    <div class="row g-4 justify-content-center">

        <!-- BOOKING -->
        <div class="col-md-6">
            <div class="card shadow p-4 h-100 border-0 text-center">
                <h4 class="mb-3">Booking Layanan</h4>
                <p class="text-muted">
                    Daftar dan atur jadwal layanan kesehatan
                </p>
                <a href="/booking" class="btn btn-primary w-100">
                    Masuk
                </a>
            </div>
        </div>

        <!-- UPLOAD -->
        <div class="col-md-6">
            <div class="card shadow p-4 h-100 border-0 text-center">
                <h4 class="mb-3">Upload Laporan dan Monitoring</h4>
                <p class="text-muted">
                    Upload dan simpan dokumen medis
                </p>
                <a href="/upload" class="btn btn-success w-100">
                    Upload
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
