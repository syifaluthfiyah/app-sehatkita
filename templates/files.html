<!doctype html>
<html>
  <head>
    <title>Daftar File</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      body {
        background: linear-gradient(135deg, #e8f5e9, #ffffff);
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        border-radius: 20px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      h2 {
        color: #2e7d32;
        font-weight: bold;
      }

      .btn-primary {
        background-color: #2e7d32;
        border: none;
      }

      .btn-primary:hover {
        background-color: #1b5e20;
      }

      .btn-secondary {
        border-radius: 10px;
      }

      table thead {
        background-color: #66bb6a;
        color: white;
      }

      .container {
        max-width: 900px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">Daftar File Upload</h2>

      <div class="card shadow p-4">
        <table class="table table-striped text-center">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama File</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            {% for file in files %}
            <tr>
              <td>{{ loop.index }}</td>
              <td>{{ file.nama_file }}</td>
              <td>
                {% if file.file_url %}
                <a href="{{ file.file_url }}" class="btn btn-primary btn-sm" target="_blank">Lihat</a>
                {% else %}
                <span class="text-muted">URL tidak tersedia</span>
                {% endif %}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <div class="text-center mt-4">
        <a href="/" class="btn btn-secondary px-4">Kembali</a>
      </div>
    </div>
  </body>
</html>
