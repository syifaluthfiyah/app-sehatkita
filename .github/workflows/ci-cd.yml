name: CI-CD SehatKita

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI - Validate App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m compileall app.py

      - name: Build Docker image
        run: |
          docker build -t sehatkita:ci .

  deploy:
    name: CD - Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app-sehatkita

            git fetch origin main
            git reset --hard origin/main

            docker build --no-cache -t sehatkita:prod .

            if [ "$(docker ps -aq -f name=sehatkita)" ]; then
              docker stop sehatkita || true
              docker rm sehatkita || true
            fi

            docker run -d \
              --name sehatkita \
              --restart unless-stopped \
              --env-file .env \
              -p 8000:8000 \
              sehatkita:prod

            sleep 2
            docker logs sehatkita
